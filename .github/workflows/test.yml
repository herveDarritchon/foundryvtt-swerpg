name: Unit Tests & Coverage

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # ou "latest" si tu préfères

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # adapte à ta version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test -- --coverage

      - name: Upload coverage to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage

playwright-e2e:
  runs-on: ubuntu-latest
  needs: test
  env:
    # Playwright utilise cette URL
    E2E_FOUNDRY_BASE_URL: http://127.0.0.1:30000
    E2E_FOUNDRY_ADMIN_PASSWORD: ${{ secrets.FOUNDRY_ADMIN_KEY }}
    E2E_FOUNDRY_USERNAME: Gamemaster
    E2E_FOUNDRY_PASSWORD: ""
    E2E_FOUNDRY_WORLD: Swerpg-E2E-World
    FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
    FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}


  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: pnpm install

    - name: Start Foundry VTT (Docker)
      run: |
        mkdir -p .foundry-data
        # Si tu as un snapshot versionné :
        # cp -R "$PWD/resources/*" .foundry-data/

        docker run -d --name foundry-e2e \
          -p 30000:30000 \
          -e FOUNDRY_LICENSE_KEY=${{ secrets.FOUNDRY_LICENSE_KEY }} \
          -e FOUNDRY_USERNAME=${{ secrets.FOUNDRY_USERNAME }} \
          -e FOUNDRY_PASSWORD=${{ secrets.FOUNDRY_PASSWORD }} \
          -e FOUNDRY_ADMIN_KEY=${{ secrets.FOUNDRY_ADMIN_KEY }} \
          -e FOUNDRY_PORT=30000 \
          -v "$PWD/.foundry-data:/data" \
          -v "$PWD:/data/Data/systems/swerpg" \
          felddy/foundryvtt:13.351.0

    - name: Wait for Foundry to be ready
      run: |
        echo "Waiting for Foundry to start on http://127.0.0.1:30000..."
        for i in {1..30}; do
          if curl -sSf http://127.0.0.1:30000/ >/dev/null 2>&1; then
            echo "Foundry is up"
            exit 0
          fi
          sleep 5
        done
        echo "Foundry did not start in time"
        docker logs foundry-e2e || true
        exit 1

    - name: Install Playwright browsers
      run: pnpm exec playwright install --with-deps

    - name: Run Playwright E2E tests
      run: pnpm e2e

    - name: Dump Foundry logs on failure
      if: failure()
      run: docker logs foundry-e2e || true

    - name: Stop Foundry container
      if: always()
      run: docker rm -f foundry-e2e || true


