name: Unit Tests & Coverage

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # ou "latest" si tu préfères

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # adapte à ta version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test -- --coverage

      # 👉 Artefact unit tests / coverage (téléchargeable sur chaque run)
      - name: Upload unit test coverage artifact
        if: always() # on garde même si les tests cassent
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-${{ github.run_number }}
          path: ./coverage
          if-no-files-found: warn
          retention-days: 7

      # Tu peux garder la publication GitHub Pages si tu veux une page publique
      - name: Upload coverage to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage